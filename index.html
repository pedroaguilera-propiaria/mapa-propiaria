<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Captación — Propiaria</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }
    #info { position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: white; padding: 8px 16px; border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 13px; z-index: 999; }
  </style>
</head>
<body>
  <div id="info">Cargando inmuebles...</div>
  <div id="map"></div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSxfRzutydR6Y8J_M4r_ssHdaPxAavRJM6Bo--TUO-znH9K_jLb61gFXyOEL-2KuJM-R03NHoZucUE6/pub?gid=0&single=true&output=csv';
    const API_KEY = 'AIzaSyBiXnNU7x2fAq7i--eY_sNkirJp9MMxBNo';
    let map;

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 41.48, lng: 1.91 },
        zoom: 12
      });
      cargarInmuebles();
    }

    async function cargarInmuebles() {
      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const filas = text.trim().split('\n').map(f => f.split(','));

        if (filas.length < 2) {
          document.getElementById('info').innerText = 'No hay inmuebles cargados';
          return;
        }

        const inmuebles = filas.slice(1);
        let pinsValidos = 0;

        inmuebles.forEach(fila => {
          const [hs_id, nombre, direccion, poblacion, estado, precio, comercial, latitud, longitud, fecha, notas] = fila;
          const lat = parseFloat(latitud);
          const lng = parseFloat(longitud);
          if (!lat || !lng) return;

          pinsValidos++;

          const marker = new google.maps.Marker({
            position: { lat, lng },
            map,
            title: nombre
          });

          const infoWindow = new google.maps.InfoWindow({
            content: `
              <div style="max-width:220px">
                <b>${nombre || ''}</b><br>
                📍 ${direccion || ''}, ${poblacion || ''}<br>
                💶 ${precio ? Number(precio).toLocaleString('es-ES') + ' €' : 'Sin precio'}<br>
                📋 ${estado || ''}<br>
                👤 ${comercial || ''}<br>
                ${notas ? '<i>' + notas + '</i>' : ''}
              </div>
            `
          });

          marker.addListener('click', () => infoWindow.open(map, marker));
        });

        document.getElementById('info').innerText = `${pinsValidos} inmuebles en el mapa`;

      } catch(e) {
        document.getElementById('info').innerText = 'Error cargando datos';
        console.error(e);
      }
    }
  </script>

  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBiXnNU7x2fAq7i--eY_sNkirJp9MMxBNo&callback=initMap">
  </script>
</body>
</html>
